<!DOCTYPE html>
<html>
<head>
  <title>Text Alignment</title>
  <style>
    body { font-size: 18px; color: #222; }
    h1 { text-align: center; color: #003366; }
    .lede { text-align: center; font-size: 1.2em; color: #555; }
    .right { text-align: right; color: #660000; }
    .small { font-size: 0.75em; color: #888; }
  </style>
</head>
<body>
  <h1>Text Alignment Demo</h1>
  <p class="lede">A centered lede paragraph inherits its alignment down the tree.</p>
  <p>Default left-aligned body text for contrast.</p>
  <p class="right">A right-aligned paragraph sits at the trailing edge.</p>
  <p class="small">A smaller trailing note at 0.75em shows honest font sizing.</p>
</body>
</html>
