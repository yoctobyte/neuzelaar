<html>
<head><title>Nested Blocks</title></head>
<body>
    <article>
        <h1>Main Article</h1>
        <div>
            <section>
                <h2>Section Title</h2>

                </blockquote>
            </section>
        </div>
    </article>
</body>
</html>
